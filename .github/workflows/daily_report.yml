name: Futures Daily Report

on:
  schedule:
    # 每天北京时间 16:00 运行 (UTC 08:00)
    - cron: '0 8 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 1. Generate charts
      env:
        TARGET_SYMBOLS: ${{ secrets.TARGET_SYMBOLS }}
      run: python main.py --step prepare

    - name: 2. Commit and push charts
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add static/charts/*.png
        git commit -m "Auto-generate futures trend charts [skip ci]" || echo "No changes to commit"
        git push

    - name: 3. AI analysis and push to DingTalk
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      run: python main.py --step notify
