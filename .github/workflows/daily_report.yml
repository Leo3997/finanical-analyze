name: Futures Daily Report

on:
  schedule:
    # 每天北京时间 08:30 运行 (UTC 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        sudo apt-get update && sudo apt-get install -y fonts-wqy-zenhei


    - name: Run Daily Report (Prepare & Notify)
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        TARGET_SYMBOLS: ${{ secrets.TARGET_SYMBOLS }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: python main.py --step all
